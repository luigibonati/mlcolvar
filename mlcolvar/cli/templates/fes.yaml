input: null           # PLUMED COLVAR file(s).
output: fes.npz       # Output .npz file. Default: fes.npz.
output_colvar: null   # COLVAR-like text output file. Default: --output path with .dat suffix.
output_yaml: null     # YAML file with the used CLI options. Default: --output path with .yaml suffix.
cvs: null             # COLVAR field names to use as collective variables.
bias: null            # COLVAR bias field(s). If more than one is provided, values are summed. Default: all fields containing 'bias'.
start: 0              # Read COLVAR rows starting from this index. Default: 0.
stop: null            # Read COLVAR rows until this index. Default: end of file.
stride: 1             # Read every Nth COLVAR row. Default: 1.
kbt: null             # Thermal energy in the desired FES units.
temp: null            # Temperature in Kelvin.
fes_units: kJ/mol     # Free-energy units when using --temp. Default: kJ/mol.
num_samples: 200      # Grid points per dimension. Default: 200.
bounds: null          # Bounds as 'min max' for 1D or 'x_min x_max y_min y_max ...' for higher dimensions. Default: data range.
bandwidth: 0.01       # KDE bandwidth. Default: 0.01.
kernel: gaussian      # KDE kernel. Default: gaussian.
scale_by: null        # Scale input variables before KDE. Default: none.
blocks: 1             # Number of blocks for uncertainty estimates. Default: 1.
backend: null         # KDE backend. Default: best available.
eps: null             # Regularization added before taking the logarithm. Default: auto-tuned.
plot: null            # Optional image file for the FES plot. Default: no plot.
plot_max_fes: null    # Mask plot values above this FES. Default: no masking.
plot_levels: null     # Contour levels for 2D plots. Default: matplotlib default.
